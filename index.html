<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control Inteligente</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
padding:20px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:#ffffff15;
border-radius:15px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button{
width:120px;
height:45px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.on{
background:#27ae60;
color:white;
}

.off{
background:#c0392b;
color:white;
}

.status{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🏠 Control de Casa Inteligente</h1>

<div class="container">

<div class="card">
<h2>💡 Foco 1</h2>
<button class="on" onclick="control('led',1)">Encender</button>
<button class="off" onclick="control('led',0)">Apagar</button>
<div class="status" id="s1">Estado...</div>
</div>

<div class="card">
<h2>💡 Foco 2</h2>
<button class="on" onclick="control('foco2',1)">Encender</button>
<button class="off" onclick="control('foco2',0)">Apagar</button>
<div class="status" id="s2">Estado...</div>
</div>

<div class="card">
<h2>💡 Foco 3</h2>
<button class="on" onclick="control('foco3',1)">Encender</button>
<button class="off" onclick="control('foco3',0)">Apagar</button>
<div class="status" id="s3">Estado...</div>
</div>

<div class="card">
<h2>🌀 Ventilador</h2>
<button class="on" onclick="control('ventilador',1)">Encender</button>
<button class="off" onclick="control('ventilador',0)">Apagar</button>
<div class="status" id="s4">Estado...</div>
</div>

</div>

<script>

var firebaseConfig = {
databaseURL: "https://proyecto-esp-32-d5795-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

function control(dispositivo,valor){
firebase.database().ref("/"+dispositivo).set(valor);
}

firebase.database().ref("led").on("value",function(snapshot){
document.getElementById("s1").innerHTML = snapshot.val()==1 ? "Encendido" : "Apagado";
});

firebase.database().ref("foco2").on("value",function(snapshot){
document.getElementById("s2").innerHTML = snapshot.val()==1 ? "Encendido" : "Apagado";
});

firebase.database().ref("foco3").on("value",function(snapshot){
document.getElementById("s3").innerHTML = snapshot.val()==1 ? "Encendido" : "Apagado";
});

firebase.database().ref("ventilador").on("value",function(snapshot){
document.getElementById("s4").innerHTML = snapshot.val()==1 ? "Encendido" : "Apagado";
});

</script>

</body>
</html>
