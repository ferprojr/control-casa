<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Home</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.header{
background:#111827;
padding:20px;
font-size:26px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:25px;

}

.card{

background:#1f2937;
border-radius:18px;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
transition:0.3s;

}

.card:hover{
transform:scale(1.05);
}

.icon{

font-size:40px;
margin-bottom:10px;

}

button{

border:none;
border-radius:12px;
padding:12px 18px;
font-size:16px;
margin:8px;
cursor:pointer;
transition:0.2s;

}

.on{

background:#22c55e;
color:white;

}

.off{

background:#ef4444;
color:white;

}

button:hover{

opacity:0.8;

}

.status{

margin-top:10px;
font-size:18px;
font-weight:bold;

}

.online{

color:#22c55e;

}

.offline{

color:#ef4444;

}

</style>

</head>

<body>

<div class="header">
🏠 Smart Home Control
</div>

<div class="grid">

<div class="card">

<div class="icon">💡</div>
<h2>Foco Sala</h2>

<button class="on" onclick="control('led',1)">Encender</button>
<button class="off" onclick="control('led',0)">Apagar</button>

<div class="status" id="s1">...</div>

</div>

<div class="card">

<div class="icon">💡</div>
<h2>Foco Cocina</h2>

<button class="on" onclick="control('foco2',1)">Encender</button>
<button class="off" onclick="control('foco2',0)">Apagar</button>

<div class="status" id="s2">...</div>

</div>

<div class="card">

<div class="icon">💡</div>
<h2>Foco Recámara</h2>

<button class="on" onclick="control('foco3',1)">Encender</button>
<button class="off" onclick="control('foco3',0)">Apagar</button>

<div class="status" id="s3">...</div>

</div>

<div class="card">

<div class="icon">🌀</div>
<h2>Ventilador</h2>

<button class="on" onclick="control('ventilador',1)">Encender</button>
<button class="off" onclick="control('ventilador',0)">Apagar</button>

<div class="status" id="s4">...</div>

</div>

</div>

<script>

var firebaseConfig = {

databaseURL: "https://proyecto-esp-32-d5795-default-rtdb.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

function control(dispositivo,valor){

firebase.database().ref("/"+dispositivo).set(valor);

}

firebase.database().ref("led").on("value",function(snapshot){

document.getElementById("s1").innerHTML =
snapshot.val()==1 ? "🟢 Encendido" : "🔴 Apagado";

});

firebase.database().ref("foco2").on("value",function(snapshot){

document.getElementById("s2").innerHTML =
snapshot.val()==1 ? "🟢 Encendido" : "🔴 Apagado";

});

firebase.database().ref("foco3").on("value",function(snapshot){

document.getElementById("s3").innerHTML =
snapshot.val()==1 ? "🟢 Encendido" : "🔴 Apagado";

});

firebase.database().ref("ventilador").on("value",function(snapshot){

document.getElementById("s4").innerHTML =
snapshot.val()==1 ? "🟢 Encendido" : "🔴 Apagado";

});

</script>

</body>
</html>
